<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
  <h1>Hash Test</h1>
  <div id="result"></div>
  <script>
    function doubleHash(password) {
      const firstHash = CryptoJS.SHA256(password).toString();
      const secondHash = CryptoJS.SHA256(firstHash).toString();
      console.log('Password:', password);
      console.log('First hash:', firstHash);
      console.log('Second hash:', secondHash);
      document.getElementById('result').innerHTML = 
        'Password: <b>' + password + '</b><br>' +
        'First SHA256: <code>' + firstHash + '</code><br>' +
        'Double SHA256: <code>' + secondHash + '</code>';
    }
    doubleHash('selam');
  </script>
</body>
</html>
