<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hide and Seek - Owner Tools</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Main App -->
    <div id="main-container" class="main-container">
      <!-- Header -->
      <nav class="nav">
        <div class="brand">Hide and Seek</div>
        <div class="menu">
          <button class="tab-btn" id="home-btn">Home</button>
          <button class="tab-btn" id="profile-btn">Profile</button>
          <button class="tab-btn active" id="owner-tools-btn">Owner Tools</button>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div id="countdown-display" class="countdown hidden">00:00</div>
          <div id="nav-username" style="color:var(--muted);font-size:12px"></div>
          <img id="nav-avatar" src="" alt="Avatar" class="nav-avatar">
          <button id="logout-btn" class="btn-secondary">Logout</button>
        </div>
      </nav>

      <!-- Owner Tools Page -->
      <main class="main-content">
        <div class="panel" style="max-width: 600px;margin:0 auto">
          <h3 style="text-align:center">Owner Tools</h3>
          
          <!-- Play Sound -->
          <div style="margin-top:20px">
            <h4 style="color:var(--neon);font-family:'Press Start 2P',monospace;font-size:12px;margin-bottom:12px">Play Sound to User</h4>
            <div class="sound-controls">
              <select id="target-user-select"></select>
              <button id="play-sound-btn" class="btn-primary">Play Sound</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
